<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#58CC02">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Türkçe">
  <title>Разговорный турецкий</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css?v=6">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">

    <section id="screen-home" class="screen active">
      <header class="top-bar">
        <div class="stat-pill streak">Серия: <span id="stat-streak">0</span></div>
        <div class="stat-pill xp"><span id="stat-xp">0</span> XP</div>
      </header>

      <div class="mascot-area">
        <h1>Разговорный турецкий</h1>
        <p class="tagline">Улица · магазин · транспорт · кафе</p>
      </div>

      <div class="xp-bar-wrap">
        <div class="xp-bar"><div id="xp-fill"></div></div>
        <span id="stat-learned">0</span> / <span id="stat-total">310</span> фраз
      </div>

      <button class="btn-main" id="btn-start-lesson">
        <span class="btn-main-label">Практика на улице</span>
        <span class="btn-main-sub" id="btn-start-lesson-sub">10 фраз · перевод и аудио</span>
      </button>

      <button class="btn-secondary-full" id="btn-start-cards">
        Карточки — слушай и повторяй
      </button>

      <h2 class="section-title">Ситуации</h2>
      <div class="unit-grid" id="unit-grid"></div>
    </section>

    <section id="screen-lesson" class="screen">
      <header class="lesson-header lesson-header-tall">
        <button class="btn-close" id="btn-close-lesson">✕</button>
        <div class="lesson-header-main">
          <div class="lesson-scenario">
            <span id="lesson-scenario-title">На улице</span>
            <small id="lesson-scenario-sub">Практика</small>
          </div>
          <div class="lesson-progress-bar"><div id="lesson-fill"></div></div>
        </div>
        <div class="lesson-hearts">Жизни: <span id="hearts">3</span></div>
      </header>

      <div class="lesson-body" id="lesson-body"></div>

      <footer class="lesson-footer hidden" id="lesson-footer">
        <div class="feedback-banner" id="feedback-banner"></div>
        <button class="btn-check" id="btn-check" disabled>Проверить</button>
        <button class="btn-check btn-continue hidden" id="btn-continue">Далее</button>
      </footer>
    </section>

    <section id="screen-cards" class="screen">
      <header class="lesson-header">
        <button class="btn-close" id="btn-close-cards">✕</button>
        <span class="cards-counter" id="cards-counter">1 / 20</span>
      </header>

      <div class="card-stage">
        <div class="duo-card" id="duo-card">
          <div class="duo-card-front">
            <p class="card-side-label">По-русски</p>
            <div class="card-ru-front" id="card-ru-front">привет</div>
            <p class="card-context" id="card-context"></p>
          </div>
          <div class="duo-card-back">
            <p class="card-side-label">По-турецки</p>
            <div class="card-word" id="card-word">merhaba</div>
            <div class="card-ru" id="card-ru">привет</div>
            <button class="btn-sound" id="card-sound">Слушать</button>
          </div>
        </div>
        <p class="card-hint">Нажми, чтобы перевернуть</p>
      </div>

      <div class="card-actions">
        <button class="btn-card btn-again" id="btn-again">Ещё раз</button>
        <button class="btn-card btn-know" id="btn-know">Знаю</button>
      </div>
    </section>

    <section id="screen-complete" class="screen">
      <div class="complete-box">
        <h2>Отлично!</h2>
        <p class="complete-scenario" id="complete-scenario"></p>
        <p class="complete-xp">+<span id="complete-xp">10</span> XP</p>
        <p class="complete-score" id="complete-score">8 / 10</p>
        <button class="btn-main" id="btn-home">Продолжить</button>
      </div>
    </section>

  </div>
  <script src="app.js?v=6"></script>
</body>
</html>
