<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#58CC02">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Türkçe">
  <title>Türkçe Öğren</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">

    <!-- Ana ekran -->
    <section id="screen-home" class="screen active">
      <header class="top-bar">
        <div class="stat-pill streak">🔥 <span id="stat-streak">0</span></div>
        <div class="stat-pill xp">⭐ <span id="stat-xp">0</span> XP</div>
      </header>

      <div class="mascot-area">
        <div class="mascot">🇹🇷</div>
        <h1>Türkçe Öğren</h1>
        <p class="tagline">500 kelime · görsel · sesli</p>
      </div>

      <div class="xp-bar-wrap">
        <div class="xp-bar"><div id="xp-fill"></div></div>
        <span id="stat-learned">0</span> / 500 kelime
      </div>

      <button class="btn-main" id="btn-start-lesson">
        <span class="btn-main-label">Dersi Başlat</span>
        <span class="btn-main-sub">Resim + dinleme · 10 kelime</span>
      </button>

      <button class="btn-secondary-full" id="btn-start-cards">
        🃏 Kartlar — dinle ve öğren
      </button>

      <div class="unit-grid" id="unit-grid"></div>
    </section>

    <!-- Ders -->
    <section id="screen-lesson" class="screen">
      <header class="lesson-header">
        <button class="btn-close" id="btn-close-lesson">✕</button>
        <div class="lesson-progress-bar"><div id="lesson-fill"></div></div>
        <div class="lesson-hearts">❤️ <span id="hearts">3</span></div>
      </header>

      <div class="lesson-body" id="lesson-body"></div>

      <footer class="lesson-footer hidden" id="lesson-footer">
        <div class="feedback-banner" id="feedback-banner"></div>
        <button class="btn-check" id="btn-check" disabled>Kontrol Et</button>
        <button class="btn-check btn-continue hidden" id="btn-continue">Devam</button>
      </footer>
    </section>

    <!-- Kartlar -->
    <section id="screen-cards" class="screen">
      <header class="lesson-header">
        <button class="btn-close" id="btn-close-cards">✕</button>
        <span class="cards-counter" id="cards-counter">1 / 20</span>
      </header>

      <div class="card-stage">
        <div class="duo-card" id="duo-card">
          <div class="duo-card-front">
            <div class="card-img" id="card-img"></div>
          </div>
          <div class="duo-card-back">
            <div class="card-word" id="card-word">merhaba</div>
            <button class="btn-sound" id="card-sound">🔊</button>
          </div>
        </div>
        <p class="card-hint">Kartı çevirmek için dokun</p>
      </div>

      <div class="card-actions">
        <button class="btn-card btn-again" id="btn-again">Tekrar</button>
        <button class="btn-card btn-know" id="btn-know">Biliyorum ✓</button>
      </div>
    </section>

    <!-- Ders bitti -->
    <section id="screen-complete" class="screen">
      <div class="complete-box">
        <div class="complete-icon">🎉</div>
        <h2>Harika!</h2>
        <p class="complete-xp">+<span id="complete-xp">10</span> XP</p>
        <p class="complete-score" id="complete-score">8 / 10</p>
        <button class="btn-main" id="btn-home">Devam Et</button>
      </div>
    </section>

  </div>
  <script src="app.js"></script>
</body>
</html>
